<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Ministries · FY 2026–2027 Department Calendar</title>
<style>
  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --ink: #1A1A2E;
    --ink-muted: #6B7280;
    --border: #E2E0DA;
    --fundraising:    #C0392B;
    --volunteers:     #D35400;
    --communications: #1A5276;
    --community:      #1E8449;
    --major-giving:   #6C3483;
    --grants:         #B03A7A;
    --corporate:      #117A65;
    --general:        #5D6D7E;
    --cell-size: 28px;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Arial', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: #1E2A3A;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header span {
    font-size: 12px;
    color: #94A3B8;
    letter-spacing: 0.05em;
  }

  .layout {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 52px);
  }

  /* ── Sidebar ─────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: #1E2A3A;
    padding: 20px 0;
    position: sticky;
    top: 52px;
    height: calc(100vh - 52px);
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 0 16px 20px;
  }

  .sidebar-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #64748B;
    padding: 0 16px 8px;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 7px 16px;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    text-align: left;
  }

  .cat-btn:hover { background: rgba(255,255,255,0.06); }
  .cat-btn.active { background: rgba(255,255,255,0.1); }

  .cat-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-name {
    font-size: 11px;
    color: #CBD5E1;
    font-weight: 500;
  }

  .cat-btn.active .cat-name { color: #FFFFFF; font-weight: 700; }

  .sidebar-divider {
    border: none;
    border-top: 1px solid #2D4059;
    margin: 12px 16px;
  }

  .add-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 0 16px;
    padding: 8px;
    background: #2D4059;
    color: #94A3B8;
    border: 1px dashed #3D5170;
    border-radius: var(--radius);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .add-btn:hover { background: #3D5170; color: white; }

  /* ── Main ────────────────────────────────────────────── */
  .main {
    flex: 1;
    padding: 24px 28px;
    overflow-x: auto;
  }

  .year-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 20px;
  }

  .calendar-grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .month-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .month-header {
    background: #2D4059;
    color: white;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .month-name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .month-year {
    font-size: 10px;
    color: #94A3B8;
  }

  .dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .dow-cell {
    text-align: center;
    padding: 5px 0;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background: #F8FAFC;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .day-cell {
    min-height: 72px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4px 5px 4px;
    position: relative;
    vertical-align: top;
    cursor: pointer;
    transition: background 0.1s;
  }

  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #F0F4F8; }
  .day-cell.empty { background: #F8FAFC; cursor: default; }
  .day-cell.today { background: #EFF6FF; }

  .day-num {
    font-size: 10px;
    font-weight: 700;
    color: #94A3B8;
    display: block;
    margin-bottom: 3px;
    line-height: 1;
  }

  .day-cell.today .day-num {
    color: #1A5276;
  }

  .entry {
    display: block;
    font-size: 9px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 2px;
    padding: 1px 3px;
    border-radius: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    cursor: pointer;
  }

  .entry:hover { opacity: 0.8; filter: brightness(1.1); }

  /* ── Modal ───────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 8px;
    width: 380px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .modal-header {
    background: #1E2A3A;
    color: white;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h2 { font-size: 13px; font-weight: 700; }

  .modal-close {
    background: none;
    border: none;
    color: #94A3B8;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .modal-close:hover { color: white; }

  .modal-body { padding: 18px; }

  .modal-body label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
    margin-top: 12px;
  }
  .modal-body label:first-child { margin-top: 0; }

  .modal-body input,
  .modal-body select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: Arial, sans-serif;
    outline: none;
  }
  .modal-body input:focus,
  .modal-body select:focus { border-color: #2D4059; }

  .modal-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #1E2A3A; color: white; }
  .btn-danger  { background: #C0392B; color: white; }
  .btn-ghost   { background: var(--border); color: var(--ink); }

  /* ── Entry list in modal ─────────────────────────────── */
  .entry-list { margin-top: 12px; }
  .entry-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: var(--radius);
    margin-bottom: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .entry-item-del {
    background: none;
    border: none;
    color: #94A3B8;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
  }
  .entry-item-del:hover { color: #C0392B; }

  .empty-day-hint {
    font-size: 11px;
    color: #94A3B8;
    text-align: center;
    padding: 8px 0;
  }

  /* ── Stats bar ───────────────────────────────────────── */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    min-width: 100px;
  }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--ink); }
  .stat-label { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>

<header>
  <h1>United Ministries · Department Calendar</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="syncStatus" style="font-size:11px;color:#94A3B8">Loading…</span>
    <span>FY 2026–2027 · Jul 2026 – Jun 2027</span>
    <button onclick="exportToCSV()" style="padding:6px 14px;background:#2D6A4F;color:white;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.05em;transition:opacity 0.15s" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">↓ Export to Excel</button>
    <button onclick="clearAll()" style="padding:6px 14px;background:#7F1D1D;color:white;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.05em;transition:opacity 0.15s" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">✕ Clear All</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Filter by Category</div>
    <button class="cat-btn active" data-cat="all" onclick="filterCat('all', this)">
      <span class="cat-swatch" style="background:#64748B"></span>
      <span class="cat-name">All Categories</span>
    </button>
    <hr class="sidebar-divider">
    <button class="cat-btn" data-cat="Fundraising" onclick="filterCat('Fundraising', this)">
      <span class="cat-swatch" style="background:var(--fundraising)"></span>
      <span class="cat-name">Fundraising</span>
    </button>
    <button class="cat-btn" data-cat="Volunteers" onclick="filterCat('Volunteers', this)">
      <span class="cat-swatch" style="background:var(--volunteers)"></span>
      <span class="cat-name">Volunteers</span>
    </button>
    <button class="cat-btn" data-cat="Communications" onclick="filterCat('Communications', this)">
      <span class="cat-swatch" style="background:var(--communications)"></span>
      <span class="cat-name">Communications</span>
    </button>
    <button class="cat-btn" data-cat="Community Events" onclick="filterCat('Community Events', this)">
      <span class="cat-swatch" style="background:var(--community)"></span>
      <span class="cat-name">Community Events</span>
    </button>
    <button class="cat-btn" data-cat="Major Giving" onclick="filterCat('Major Giving', this)">
      <span class="cat-swatch" style="background:var(--major-giving)"></span>
      <span class="cat-name">Major Giving</span>
    </button>
    <button class="cat-btn" data-cat="Grants" onclick="filterCat('Grants', this)">
      <span class="cat-swatch" style="background:var(--grants)"></span>
      <span class="cat-name">Grants</span>
    </button>
    <button class="cat-btn" data-cat="Corporate Engagement" onclick="filterCat('Corporate Engagement', this)">
      <span class="cat-swatch" style="background:var(--corporate)"></span>
      <span class="cat-name">Corporate Engagement</span>
    </button>
    <button class="cat-btn" data-cat="General" onclick="filterCat('General', this)">
      <span class="cat-swatch" style="background:var(--general)"></span>
      <span class="cat-name">General</span>
    </button>
    <hr class="sidebar-divider">
    <div class="sidebar-section">
      <div style="font-size:10px;color:#64748B;line-height:1.5;padding:0 0 8px">
        Click any day to add or edit entries. Use the filter above to focus on one category.
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="year-label">FY 2026–2027 Annual Overview · 365 Days</div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total Items</div></div>
      <div class="stat"><div class="stat-num" id="stat-months">12</div><div class="stat-label">Months</div></div>
      <div class="stat"><div class="stat-num" id="stat-busiest">—</div><div class="stat-label">Busiest Month</div></div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Entry</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="entry-list" id="existingEntries"></div>
      <label>Entry Text <span style="font-weight:400;text-transform:none;letter-spacing:0">(2–3 words)</span></label>
      <input type="text" id="entryText" placeholder="e.g. Spring Appeal" maxlength="40">
      <label>Category</label>
      <select id="entryCategory">
        <option value="Fundraising">Fundraising</option>
        <option value="Volunteers">Volunteers</option>
        <option value="Communications">Communications</option>
        <option value="Community Events">Community Events</option>
        <option value="Major Giving">Major Giving</option>
        <option value="Grants">Grants</option>
        <option value="Corporate Engagement">Corporate Engagement</option>
        <option value="General">General</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()">Add to Calendar</button>
    </div>
  </div>
</div>

<script>
const MONTHS = [
  {yr:2026,mo:7,name:"July"},
  {yr:2026,mo:8,name:"August"},
  {yr:2026,mo:9,name:"September"},
  {yr:2026,mo:10,name:"October"},
  {yr:2026,mo:11,name:"November"},
  {yr:2026,mo:12,name:"December"},
  {yr:2027,mo:1,name:"January"},
  {yr:2027,mo:2,name:"February"},
  {yr:2027,mo:3,name:"March"},
  {yr:2027,mo:4,name:"April"},
  {yr:2027,mo:5,name:"May"},
  {yr:2027,mo:6,name:"June"},
];

const CAT_COLORS = {
  "Fundraising":          "#C0392B",
  "Volunteers":           "#D35400",
  "Communications":       "#1A5276",
  "Community Events":     "#1E8449",
  "Major Giving":         "#6C3483",
  "Grants":               "#B03A7A",
  "Corporate Engagement": "#117A65",
  "General":              "#5D6D7E",
};

const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

// entries: { "2026-07-15": [{text, cat}, ...] }
let entries = {};
let currentFilter = "all";
let modalDateKey = null;

function dateKey(yr, mo, day) {
  return `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function daysInMonth(yr, mo) {
  return new Date(yr, mo, 0).getDate();
}

function firstDayOfWeek(yr, mo) {
  return new Date(yr, mo-1, 1).getDay(); // 0=Sun
}

function catColor(cat) {
  return CAT_COLORS[cat] || "#5D6D7E";
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  MONTHS.forEach(({yr, mo, name}) => {
    const block = document.createElement('div');
    block.className = 'month-block';
    block.dataset.month = `${yr}-${mo}`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `<span class="month-name">${name}</span><span class="month-year">${yr}</span>`;
    block.appendChild(hdr);

    // DOW row
    const dowRow = document.createElement('div');
    dowRow.className = 'dow-row';
    DOW.forEach(d => {
      const dc = document.createElement('div');
      dc.className = 'dow-cell';
      dc.textContent = d;
      dowRow.appendChild(dc);
    });
    block.appendChild(dowRow);

    // Days grid
    const daysGrid = document.createElement('div');
    daysGrid.className = 'days-grid';

    const firstDay = firstDayOfWeek(yr, mo);
    const totalDays = daysInMonth(yr, mo);

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'day-cell empty';
      daysGrid.appendChild(empty);
    }

    // Day cells
    for (let d = 1; d <= totalDays; d++) {
      const key = dateKey(yr, mo, d);
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.dataset.key = key;

      const today = new Date();
      if (yr === today.getFullYear() && mo === today.getMonth()+1 && d === today.getDate()) {
        cell.classList.add('today');
      }

      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = d;
      cell.appendChild(num);

      // Entries
      const dayEntries = entries[key] || [];
      dayEntries.forEach((e, idx) => {
        if (currentFilter !== 'all' && e.cat !== currentFilter) return;
        const tag = document.createElement('span');
        tag.className = 'entry';
        tag.textContent = e.text;
        tag.style.color = 'white';
        tag.style.background = catColor(e.cat);
        tag.title = `${e.text} · ${e.cat}`;
        cell.appendChild(tag);
      });

      cell.addEventListener('click', () => openModal(key, yr, mo, d));
      daysGrid.appendChild(cell);
    }

    block.appendChild(daysGrid);
    grid.appendChild(block);
  });

  updateStats();
}

function openModal(key, yr, mo, d) {
  modalDateKey = key;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById('modalTitle').textContent = `${months[mo-1]} ${d}, ${yr}`;
  document.getElementById('entryText').value = '';

  const existing = document.getElementById('existingEntries');
  const dayEntries = entries[key] || [];

  if (dayEntries.length === 0) {
    existing.innerHTML = '<div class="empty-day-hint">No entries yet — add one below</div>';
  } else {
    existing.innerHTML = dayEntries.map((e, i) => `
      <div class="entry-item" style="background:${hexToRgba(catColor(e.cat), 0.12)};color:${catColor(e.cat)}">
        <span>■ ${e.text} <span style="font-weight:400;color:#64748B;font-size:10px">${e.cat}</span></span>
        <button class="entry-item-del" onclick="deleteEntry('${key}', ${i})">×</button>
      </div>
    `).join('');
  }

  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('entryText').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalDateKey = null;
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcbEZIvdUMNcjm56kJmPiPYNr9Yfeu1bZF9T05mkdHja-h0jgom4IPFjYVCYTV3LTY/exec';

function setStatus(msg, color) {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = msg; el.style.color = color || '#94A3B8'; }
}

async function loadFromSheets() {
  setStatus('Loading…', '#94A3B8');
  try {
    const res = await fetch(SCRIPT_URL);
    const raw = await res.json();
    // Normalize keys to YYYY-MM-DD regardless of how they came back
    entries = {};
    Object.keys(raw).forEach(k => {
      const normalized = normalizeDate(k);
      if (normalized) entries[normalized] = raw[k];
    });
    buildCalendar();
    setStatus('Synced ✓', '#2D6A4F');
  } catch(e) {
    setStatus('Load failed — check connection', '#C0392B');
    buildCalendar();
  }
}

function normalizeDate(str) {
  if (!str) return null;
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  // MM/DD/YYYY
  const mdy = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) return `${mdy[3]}-${mdy[1].padStart(2,'0')}-${mdy[2].padStart(2,'0')}`;
  // Try parsing as date object
  const d = new Date(str);
  if (!isNaN(d)) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  return null;
}

async function saveEntry() {
  const text = document.getElementById('entryText').value.trim();
  const cat  = document.getElementById('entryCategory').value;
  if (!text || !modalDateKey) return;

  const key = modalDateKey;
  if (!entries[key]) entries[key] = [];
  entries[key].push({ text, cat });
  closeModal();
  buildCalendar();

  setStatus('Saving…', '#D35400');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'add', date: key, category: cat, text }),
    });
    setStatus('Saved ✓', '#2D6A4F');
  } catch(e) {
    setStatus('Save failed — entry shown locally only', '#C0392B');
  }
}

async function deleteEntry(key, idx) {
  const entry = entries[key][idx];
  entries[key].splice(idx, 1);
  if (entries[key].length === 0) delete entries[key];
  closeModal();
  buildCalendar();

  setStatus('Deleting…', '#D35400');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', date: key, category: entry.cat, text: entry.text }),
    });
    setStatus('Synced ✓', '#2D6A4F');
  } catch(e) {
    setStatus('Delete failed on server', '#C0392B');
  }
}

function filterCat(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildCalendar();
}

function updateStats() {
  const total = Object.values(entries).reduce((sum, arr) => sum + arr.length, 0);
  document.getElementById('stat-total').textContent = total;

  // Busiest month
  let busiest = '—';
  let max = 0;
  MONTHS.forEach(({yr, mo, name}) => {
    let count = 0;
    const totalDays = daysInMonth(yr, mo);
    for (let d = 1; d <= totalDays; d++) {
      const key = dateKey(yr, mo, d);
      count += (entries[key] || []).length;
    }
    if (count > max) { max = count; busiest = name.slice(0,3); }
  });
  document.getElementById('stat-busiest').textContent = max > 0 ? busiest : '—';
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter key in input
document.getElementById('entryText').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveEntry();
});

// Load from Google Sheets on startup
loadFromSheets();

async function clearAll() {
  if (!confirm('Clear all calendar entries from Google Sheets? This cannot be undone.')) return;
  entries = {};
  buildCalendar();
  setStatus('Clearing…', '#D35400');
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'clearAll' }),
    });
    setStatus('Cleared ✓', '#2D6A4F');
  } catch(e) {
    setStatus('Clear failed on server', '#C0392B');
  }
}

function exportToCSV() {
  const total = Object.values(entries).reduce((sum, arr) => sum + arr.length, 0);
  if (total === 0) {
    alert('No entries to export yet. Add some items to the calendar first.');
    return;
  }

  const MONTH_NAMES_FULL = ["January","February","March","April","May","June",
                             "July","August","September","October","November","December"];

  // Build rows: Date, Day of Week, Month, Year, Category, Entry
  const DOW_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  let rows = [["Date","Day","Month","Year","Quarter","Category","Entry"]];

  MONTHS.forEach(({yr, mo, name}) => {
    const quarter = mo >= 7 && mo <= 9 ? "Q1 (Jul-Sep 2026)"
                  : mo >= 10 ? "Q2 (Oct-Dec 2026)"
                  : mo >= 1 && mo <= 3 ? "Q3 (Jan-Mar 2027)"
                  : "Q4 (Apr-Jun 2027)";

    const totalDays = daysInMonth(yr, mo);
    for (let d = 1; d <= totalDays; d++) {
      const key = dateKey(yr, mo, d);
      const dayEntries = entries[key] || [];
      if (dayEntries.length === 0) continue;
      const dow = DOW_FULL[new Date(yr, mo-1, d).getDay()];
      const dateStr = `${String(mo).padStart(2,'0')}/${String(d).padStart(2,'0')}/${yr}`;
      dayEntries.forEach(e => {
        rows.push([dateStr, dow, name, yr, quarter, e.cat, e.text]);
      });
    }
  });

  // Convert to CSV
  const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'UM_Department_Calendar_FY2627.csv';
  a.click();
  URL.revokeObjectURL(url);
}
